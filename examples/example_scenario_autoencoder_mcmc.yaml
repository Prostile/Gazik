well:
  name: TRAINING_HYBRID2_GAS_SAND_001
  field: Synthetic Training Field
  country: Synthetic

depth:
  start: 900.0
  stop: 1200.0
  step: 0.1
  unit: m

geology:
  depositional_environment: clastic_shallow_marine
  stacking_pattern: shale_sand_alternation
  facies_set: [shale, shaly_sandstone, clean_sandstone, tight_sandstone]

target:
  reservoir_type: clean_sandstone
  hydrocarbon: gas
  net_pay_thickness_m: [8, 16]
  porosity_range: [0.18, 0.28]
  water_saturation_range: [0.20, 0.45]

curves: [DEPT, GR, CALI, RHOB, NPHI, DT, RT]

artifacts:
  noise: true
  washout: true
  spikes: true
  missing_intervals: false
  depth_shift: false

realism:
  mode: autoencoder_mcmc
  strength: 0.4
  model_path: models/autoencoder_v001
  fallback: statistical
  max_attempts_per_window: 20
  max_constraint_score: 0.05

tool_resolution:
  enabled: true
  windows_m:
    GR: 0.3
    RHOB: 0.2
    NPHI: 0.3
    DT: 0.3
    RT: 0.5

difficulty: advanced
seed: 42
